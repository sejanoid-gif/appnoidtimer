<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer No ID</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface-2: #1c1c1c;
  --text: #f4f4f4;
  --text-dim: #9a9a9a;
  --text-muted: #5a5a5a;
  --accent: #e50914;
  --accent-soft: #2a0608;
  --border: #262626;
  --border-strong: #3a3a3a;
  --warn: #e0a135;
  --font: 'DM Sans', system-ui, -apple-system, sans-serif;
  --mono: 'DM Mono', ui-monospace, monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input { font-family: inherit; color: inherit; }

.page {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 88px 24px 72px;
  position: relative;
  gap: 32px;
}

.brand {
  position: absolute;
  top: 32px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--text-dim);
  font-size: 12px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  font-weight: 500;
  white-space: nowrap;
}
.brand-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 12px var(--accent);
}

/* Daily usage top-right/left */
.usage {
  position: absolute;
  top: 28px;
  left: 28px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 2px;
  color: var(--text-muted);
}
.usage-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--text-muted);
}
.usage-value {
  font-family: var(--mono);
  font-size: 16px;
  color: var(--text-dim);
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.02em;
}

.top-actions {
  position: absolute;
  top: 22px;
  right: 22px;
  display: flex;
  gap: 6px;
}
.icon-btn {
  width: 36px; height: 36px;
  border-radius: 9px;
  display: grid; place-items: center;
  color: var(--text-muted);
  transition: color .15s, background .15s;
}
.icon-btn:hover { color: var(--text); background: var(--surface); }
.icon-btn svg { width: 18px; height: 18px; }

.timer-card {
  width: 100%;
  max-width: 440px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
}

.ring-wrap {
  position: relative;
  width: 340px;
  height: 340px;
}
@media (max-width: 480px) {
  .ring-wrap { width: 280px; height: 280px; }
  .usage { top: 24px; left: 20px; }
}
.ring-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.ring-track { fill: none; stroke: var(--border); stroke-width: 4; }
.ring-progress {
  fill: none;
  stroke: var(--accent);
  stroke-width: 5;
  stroke-linecap: round;
  transition: stroke-dashoffset .4s linear, stroke .3s;
  filter: drop-shadow(0 0 6px rgba(229,9,20,0.4));
}
.ring-progress.warn { stroke: var(--warn); filter: drop-shadow(0 0 6px rgba(224,161,53,0.4)); }

.ring-center {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
}
.ring-time {
  font-family: var(--mono);
  font-size: 68px;
  font-weight: 500;
  font-variant-numeric: tabular-nums;
  color: var(--text);
  cursor: pointer;
  padding: 4px 14px;
  border-radius: 10px;
  transition: background .15s;
  text-align: center;
  line-height: 1;
  user-select: none;
  outline: none;
  letter-spacing: -0.01em;
}
.ring-time:hover { background: rgba(255,255,255,0.04); }
.ring-time.editing {
  background: var(--surface-2);
  outline: 1px solid var(--accent);
  cursor: text;
}
@media (max-width: 480px) {
  .ring-time { font-size: 54px; }
}

.timer-controls {
  display: flex;
  justify-content: center;
  gap: 14px;
}
.ctrl {
  width: 48px; height: 48px;
  border-radius: 50%;
  background: var(--surface);
  border: 1px solid var(--border);
  display: grid; place-items: center;
  color: var(--text-dim);
  transition: all .15s;
}
.ctrl:hover { color: var(--text); border-color: var(--border-strong); background: var(--surface-2); }
.ctrl.primary {
  width: 64px; height: 64px;
  background: var(--accent);
  color: white;
  border-color: var(--accent);
  box-shadow: 0 4px 20px rgba(229,9,20,0.4);
}
.ctrl.primary:hover { filter: brightness(1.08); transform: scale(1.03); }
.ctrl svg { width: 20px; height: 20px; }
.ctrl.primary svg { width: 26px; height: 26px; }

.chips {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 8px;
  width: 100%;
  max-width: 360px;
}
.chip {
  padding: 9px 10px;
  border-radius: 100px;
  background: var(--surface);
  border: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-dim);
  text-align: center;
  transition: all .15s;
  white-space: nowrap;
}
.chip:hover { border-color: var(--border-strong); color: var(--text); }
.chip.active {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--accent);
}

/* Alarm banner */
.alarm-banner {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 200;
  background: var(--accent);
  color: white;
  padding: 18px 22px;
  border-radius: 14px;
  display: none;
  align-items: center;
  gap: 14px;
  box-shadow: 0 10px 40px rgba(229,9,20,0.5);
  animation: pulse 0.8s ease-in-out infinite;
}
.alarm-banner.show { display: flex; }
@keyframes pulse {
  0%, 100% { box-shadow: 0 10px 40px rgba(229,9,20,0.5); }
  50% { box-shadow: 0 10px 60px rgba(229,9,20,0.9); }
}
.alarm-banner .title { font-weight: 600; font-size: 14px; letter-spacing: 0.08em; text-transform: uppercase; }
.alarm-banner button {
  padding: 8px 16px;
  border-radius: 8px;
  background: rgba(0,0,0,0.3);
  color: white;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.alarm-banner button:hover { background: rgba(0,0,0,0.5); }

/* Modal */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(6px);
  display: none;
  align-items: center; justify-content: center;
  z-index: 100; padding: 20px;
}
.modal-backdrop.open { display: flex; }
.modal {
  background: var(--surface);
  border-radius: 14px;
  border: 1px solid var(--border);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  width: 100%; max-width: 420px;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
}
.modal.wide { max-width: 560px; }
.modal-head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.modal-head h2 { font-size: 14px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
.modal-body { padding: 10px 20px; overflow-y: auto; }
.icon-close {
  width: 32px; height: 32px; border-radius: 8px;
  display: grid; place-items: center; color: var(--text-dim);
}
.icon-close:hover { background: var(--surface-2); color: var(--text); }

.setting-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 0; border-bottom: 1px solid var(--border); gap: 12px;
}
.setting-row:last-child { border-bottom: none; }
.setting-label { font-size: 13px; }
.setting-hint { font-size: 11.5px; color: var(--text-muted); margin-top: 2px; }
.setting-sub { display: flex; flex-direction: column; }
.switch {
  width: 38px; height: 22px;
  background: var(--border-strong);
  border-radius: 100px;
  position: relative;
  transition: background .2s;
  flex-shrink: 0; cursor: pointer;
}
.switch.on { background: var(--accent); }
.switch::after {
  content: ''; position: absolute;
  top: 2px; left: 2px;
  width: 18px; height: 18px;
  border-radius: 50%; background: white;
  transition: transform .2s;
}
.switch.on::after { transform: translateX(16px); }
.volume-slider { width: 140px; accent-color: var(--accent); }
.sound-select {
  padding: 6px 10px;
  border-radius: 6px;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 12px;
}
.reset-usage {
  padding: 6px 12px;
  border-radius: 6px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 12px;
}
.reset-usage:hover { color: var(--accent); border-color: var(--accent); }

/* History */
.stats-grid-top {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin: 12px 0 10px;
}
.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin: 0 0 18px;
}
.stat-card {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 10px;
  text-align: center;
  position: relative;
}
.stat-card.highlight {
  background: linear-gradient(180deg, rgba(229,9,20,0.08) 0%, var(--surface-2) 100%);
  border-color: rgba(229,9,20,0.3);
}
.stat-card.highlight .stat-value { color: #ff4d5a; }
.stat-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.stat-value {
  font-family: var(--mono);
  font-size: 18px;
  color: var(--text);
  font-variant-numeric: tabular-nums;
  font-weight: 500;
}
.stat-sub {
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 3px;
}

.chart-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--text-muted);
  margin: 14px 0 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.chart-title .legend {
  display: flex;
  gap: 12px;
  text-transform: none;
  letter-spacing: 0.02em;
  font-size: 10px;
}
.chart-title .legend span {
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.chart-title .legend .dot {
  width: 9px; height: 9px;
  border-radius: 2px;
  display: inline-block;
}
.chart-wrap {
  position: relative;
  background: linear-gradient(180deg, #171717 0%, #0f0f0f 100%);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px 16px 14px;
  margin-bottom: 14px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
}
.chart-svg {
  width: 100%;
  height: 180px;
  display: block;
  overflow: visible;
}
.chart-bar {
  transition: opacity .15s, transform .2s;
  cursor: pointer;
  transform-origin: bottom;
  transform-box: fill-box;
}
.chart-bar:hover { opacity: 0.88; }
.chart-baseline {
  stroke: var(--border-strong);
  stroke-width: 1;
  opacity: 0.5;
}
.chart-avg-line {
  stroke: var(--text-dim);
  stroke-width: 1;
  stroke-dasharray: 4 4;
  opacity: 0.35;
}
.chart-avg-label {
  fill: var(--text-muted);
  font-family: var(--font);
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.02em;
}
.chart-day-label {
  fill: var(--text-dim);
  font-family: var(--font);
  font-size: 10px;
  font-weight: 500;
}
.chart-day-label.today-label {
  fill: var(--warn);
  font-weight: 700;
}
.chart-weekday-label {
  fill: var(--text-muted);
  font-family: var(--font);
  font-size: 8px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 500;
}
.chart-value-label {
  fill: var(--text);
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 500;
  pointer-events: none;
  opacity: 0;
  transition: opacity .15s;
}
.chart-value-label.show { opacity: 1; }

.history-list {
  max-height: 220px;
  overflow-y: auto;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--surface-2);
}
.history-list::-webkit-scrollbar { width: 6px; }
.history-list::-webkit-scrollbar-track { background: transparent; }
.history-list::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
.history-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.history-row:last-child { border-bottom: none; }
.history-row .date { color: var(--text-dim); display: flex; flex-direction: column; gap: 2px; }
.history-row .date small { color: var(--text-muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; }
.history-row .time {
  font-family: var(--mono);
  color: var(--text);
  font-variant-numeric: tabular-nums;
}
.history-row.today .time { color: var(--accent); }
.history-empty {
  padding: 30px 20px;
  text-align: center;
  color: var(--text-muted);
  font-size: 12px;
}
.history-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 12px;
  padding-bottom: 6px;
}

.tooltip {
  position: absolute;
  background: var(--bg);
  border: 1px solid var(--border-strong);
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 11px;
  color: var(--text);
  font-family: var(--mono);
  pointer-events: none;
  white-space: nowrap;
  z-index: 10;
  opacity: 0;
  transition: opacity .15s;
}
.tooltip.show { opacity: 1; }

.hint {
  position: absolute;
  bottom: 20px;
  left: 0; right: 0;
  text-align: center;
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.14em;
  text-transform: uppercase;
}
.hint kbd {
  display: inline-block;
  padding: 2px 6px;
  border: 1px solid var(--border-strong);
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 10px;
  margin: 0 2px;
  color: var(--text-dim);
}
</style>
</head>
<body>
<div class="page">

  <div class="usage" title="Tempo de uso do timer hoje">
    <span class="usage-label">Uso de hoje</span>
    <span class="usage-value" id="usageValue">00:00:00</span>
  </div>

  <div class="brand">
    <span class="brand-dot"></span>
    <span>Timer No ID</span>
  </div>

  <div class="top-actions">
    <button class="icon-btn" id="historyBtn" title="Histórico">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 16V11"/><path d="M12 16V7"/><path d="M17 16v-3"/></svg>
    </button>
    <button class="icon-btn" id="settingsBtn" title="Configurações">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3h0a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.9-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8v0a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"></path></svg>
    </button>
  </div>

  <section class="timer-card">
    <div class="ring-wrap">
      <svg class="ring-svg" viewBox="0 0 100 100">
        <circle class="ring-track" cx="50" cy="50" r="46"></circle>
        <circle id="ringProgress" class="ring-progress" cx="50" cy="50" r="46" stroke-dasharray="289.03" stroke-dashoffset="0"></circle>
      </svg>
      <div class="ring-center">
        <div id="ringTime" class="ring-time" title="Clique para editar">10:00</div>
      </div>
    </div>

    <div class="timer-controls">
      <button class="ctrl" id="resetBtn" title="Resetar (R)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"></path><path d="M3 3v5h5"></path></svg>
      </button>
      <button class="ctrl primary" id="playBtn" title="Iniciar/Pausar (Espaço)">
        <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"></path></svg>
      </button>
    </div>

    <div class="chips" id="countdownChips">
      <button class="chip" data-sec="100">1 min 40 s</button>
      <button class="chip" data-sec="120">2 min</button>
      <button class="chip" data-sec="180">3 min</button>
      <button class="chip" data-sec="480">8 min</button>
      <button class="chip active" data-sec="600">10 min</button>
      <button class="chip" data-sec="900">15 min</button>
    </div>
  </section>

  <div class="hint">
    <kbd>Espaço</kbd> iniciar / pausar &nbsp;·&nbsp; <kbd>R</kbd> resetar &nbsp;·&nbsp; clique no tempo para editar
  </div>
</div>

<div class="alarm-banner" id="alarmBanner">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"></path><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"></path></svg>
  <span class="title">Tempo esgotado</span>
  <button id="stopAlarmBtn">Parar</button>
</div>

<div class="modal-backdrop" id="settingsModal">
  <div class="modal">
    <div class="modal-head">
      <h2>Configurações</h2>
      <button class="icon-close" data-close="">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"></path></svg>
      </button>
    </div>
    <div class="modal-body" id="settingsBody"></div>
  </div>
</div>

<div class="modal-backdrop" id="historyModal">
  <div class="modal wide">
    <div class="modal-head">
      <h2>Histórico</h2>
      <button class="icon-close" data-close="">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"></path></svg>
      </button>
    </div>
    <div class="modal-body" id="historyBody"></div>
  </div>
</div>

<script>
const $ = (s, c=document) => c.querySelector(s);
const $$ = (s, c=document) => [...c.querySelectorAll(s)];
const STORAGE_KEY = 'timernoid_v2';
const pad = n => String(n).padStart(2, '0');
const todayKey = () => {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
};

const defaultState = () => ({
  settings: {
    soundEnabled: true,
    volume: 0.5,
    soundKind: 'chime',
    victoryKind: 'celebrate',
  },
  usage: {
    date: todayKey(),
    seconds: 0,
  },
  history: {}, // { "2025-04-22": 3600, "2025-04-23": 7200, ... }
});

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    const parsed = JSON.parse(raw);
    const def = defaultState();
    const st = {
      settings: { ...def.settings, ...(parsed.settings || {}) },
      usage: { ...def.usage, ...(parsed.usage || {}) },
      history: { ...(parsed.history || {}) },
    };
    // If day changed, archive the previous day before resetting
    if (st.usage.date !== todayKey()) {
      if (st.usage.seconds > 0) {
        st.history[st.usage.date] = Math.floor(st.usage.seconds);
      }
      st.usage.date = todayKey();
      st.usage.seconds = 0;
    }
    return st;
  } catch (e) { return defaultState(); }
}
let state = loadState();
let saveTimer = null;
function save() {
  if (saveTimer) return;
  saveTimer = setTimeout(() => {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    saveTimer = null;
  }, 300);
}
function saveNow() {
  if (saveTimer) { clearTimeout(saveTimer); saveTimer = null; }
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

// Archive current day into history if day has changed
function rolloverIfNeeded() {
  if (state.usage.date !== todayKey()) {
    if (state.usage.seconds > 0) {
      state.history[state.usage.date] = Math.floor(state.usage.seconds);
    }
    state.usage.date = todayKey();
    state.usage.seconds = 0;
    saveNow();
    return true;
  }
  return false;
}

// ===== TIMER =====
const Timer = {
  running: false,
  interval: null,
  totalMs: 10 * 60 * 1000,
  remainingMs: 10 * 60 * 1000,
  lastTick: 0,
};

function updateDisplay() {
  const ring = $('#ringProgress');
  const time = $('#ringTime');
  const circumference = 2 * Math.PI * 46;
  const progressPct = Timer.totalMs > 0 ? 1 - (Timer.remainingMs / Timer.totalMs) : 0;

  const totalSecs = Math.max(0, Math.ceil(Timer.remainingMs / 1000));
  const h = Math.floor(totalSecs / 3600);
  const m = Math.floor((totalSecs % 3600) / 60);
  const s = totalSecs % 60;
  if (!time.classList.contains('editing')) {
    time.textContent = h > 0 ? `${pad(h)}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
  }

  ring.style.strokeDasharray = circumference;
  ring.style.strokeDashoffset = circumference * (1 - progressPct);
  ring.classList.remove('warn');
  const remainPct = Timer.totalMs > 0 ? Timer.remainingMs / Timer.totalMs : 1;
  if (remainPct >= 0.25 && remainPct < 0.5) ring.classList.add('warn');

  const playIcon = $('#playIcon');
  playIcon.innerHTML = Timer.running
    ? '<path d="M6 4h4v16H6zM14 4h4v16h-4z"/>'
    : '<path d="M8 5v14l11-7z"/>';

  document.title = (Timer.running ? '▶ ' : '') + time.textContent + ' — Timer No ID';
}

function updateUsageDisplay() {
  rolloverIfNeeded();
  const total = Math.floor(state.usage.seconds);
  const h = Math.floor(total / 3600);
  const m = Math.floor((total % 3600) / 60);
  const s = total % 60;
  $('#usageValue').textContent = `${pad(h)}:${pad(m)}:${pad(s)}`;
}

function startTimer() {
  if (Timer.running) return;
  if (Timer.remainingMs <= 0) return;
  Timer.running = true;
  Timer.lastTick = performance.now();
  Timer.interval = setInterval(tick, 100);
  updateDisplay();
}
function pauseTimer() {
  Timer.running = false;
  if (Timer.interval) clearInterval(Timer.interval);
  Timer.interval = null;
  updateDisplay();
}

function tick() {
  const now = performance.now();
  const dt = now - Timer.lastTick;
  Timer.lastTick = now;
  Timer.remainingMs -= dt;

  // If the day rolled over during a run, archive before accumulating
  rolloverIfNeeded();

  state.usage.seconds += dt / 1000;
  if (Math.floor(state.usage.seconds) % 5 === 0) save();

  if (Timer.remainingMs <= 0) {
    Timer.remainingMs = 0;
    onComplete();
  }
  updateDisplay();
  const total = Math.floor(state.usage.seconds);
  const h = Math.floor(total / 3600);
  const m = Math.floor((total % 3600) / 60);
  const s = total % 60;
  $('#usageValue').textContent = `${pad(h)}:${pad(m)}:${pad(s)}`;
}

function onComplete() {
  pauseTimer();
  saveNow();
  playAlarm();
  $('#alarmBanner').classList.add('show');
}

$('#playBtn').addEventListener('click', () => { stopAlarm(); if (Timer.running) pauseTimer(); else startTimer(); });
$('#resetBtn').addEventListener('click', () => {
  stopAlarm(); pauseTimer();
  Timer.remainingMs = Timer.totalMs;
  updateDisplay();
});

const ringTimeEl = $('#ringTime');
function parseTimeInput(str) {
  str = (str || '').trim().replace(/[^0-9:]/g, '');
  if (!str) return null;
  if (str.includes(':')) {
    const parts = str.split(':').map(p => parseInt(p) || 0);
    let h=0, m=0, s=0;
    if (parts.length === 3) { [h, m, s] = parts; }
    else if (parts.length === 2) { [m, s] = parts; }
    else { m = parts[0]; }
    return (h*3600 + m*60 + s) * 1000;
  } else {
    const n = parseInt(str) || 0;
    if (str.length <= 2) return n * 60 * 1000;
    if (str.length <= 4) {
      const m = parseInt(str.slice(0, str.length - 2));
      const s = parseInt(str.slice(-2));
      return (m * 60 + s) * 1000;
    }
    const h = parseInt(str.slice(0, str.length - 4));
    const m = parseInt(str.slice(-4, -2));
    const s = parseInt(str.slice(-2));
    return (h*3600 + m*60 + s) * 1000;
  }
}
ringTimeEl.addEventListener('click', () => {
  if (Timer.running || ringTimeEl.classList.contains('editing')) return;
  const before = ringTimeEl.textContent;
  ringTimeEl.classList.add('editing');
  ringTimeEl.contentEditable = 'true';
  ringTimeEl.focus();
  const range = document.createRange();
  range.selectNodeContents(ringTimeEl);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  const finish = (commit) => {
    ringTimeEl.contentEditable = 'false';
    ringTimeEl.classList.remove('editing');
    ringTimeEl.removeEventListener('keydown', onKey);
    ringTimeEl.removeEventListener('blur', onBlur);
    if (commit) {
      const ms = parseTimeInput(ringTimeEl.textContent);
      if (ms && ms > 0) {
        Timer.totalMs = ms;
        Timer.remainingMs = ms;
        $$('#countdownChips .chip').forEach(c => c.classList.remove('active'));
      }
    }
    updateDisplay();
  };
  const onKey = (e) => {
    if (e.key === 'Enter') { e.preventDefault(); finish(true); }
    else if (e.key === 'Escape') { e.preventDefault(); ringTimeEl.textContent = before; finish(false); }
  };
  const onBlur = () => finish(true);
  ringTimeEl.addEventListener('keydown', onKey);
  ringTimeEl.addEventListener('blur', onBlur);
});

let audioCtx = null;
let alarmInterval = null;
let alarmNodes = [];

function ensureCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playChime(startOffset = 0) {
  const ctx = ensureCtx();
  const now = ctx.currentTime + startOffset;
  const vol = state.settings.volume || 0.5;
  const master = ctx.createGain();
  master.gain.value = vol * 0.6;
  master.connect(ctx.destination);
  const filter = ctx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 2800;
  filter.Q.value = 0.5;
  filter.connect(master);
  const notes = [
    { freq: 523.25, start: 0,    dur: 1.2 },
    { freq: 659.25, start: 0.18, dur: 1.2 },
    { freq: 783.99, start: 0.36, dur: 1.6 },
  ];
  notes.forEach(n => {
    const osc = ctx.createOscillator();
    const osc2 = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'sine';
    osc2.type = 'triangle';
    osc.frequency.value = n.freq;
    osc2.frequency.value = n.freq * 2;
    osc2.detune.value = 4;
    const mix = ctx.createGain();
    mix.gain.value = 0.25;
    osc2.connect(mix);
    osc.connect(g);
    mix.connect(g);
    g.gain.setValueAtTime(0, now + n.start);
    g.gain.linearRampToValueAtTime(0.8, now + n.start + 0.05);
    g.gain.exponentialRampToValueAtTime(0.001, now + n.start + n.dur);
    g.connect(filter);
    osc.start(now + n.start);
    osc2.start(now + n.start);
    osc.stop(now + n.start + n.dur + 0.05);
    osc2.stop(now + n.start + n.dur + 0.05);
    alarmNodes.push(osc, osc2);
  });
}

function playBell() {
  const ctx = ensureCtx();
  const now = ctx.currentTime;
  const vol = state.settings.volume || 0.5;
  const master = ctx.createGain();
  master.gain.value = vol * 0.55;
  master.connect(ctx.destination);

  const partials = [1, 2.01, 3.0, 4.98];

    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = fund * p;
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(gains[i] * 0.5, now + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, now + 1.8);
    osc.connect(g).connect(master);
    osc.start(now);
    osc.stop(now + 1.9);
    alarmNodes.push(osc);
  });
}

function playSoft() {
  const ctx = ensureCtx();

    osc.connect(g).connect(master);
    osc.start(now + i * 0.4);
    osc.stop(now + i * 0.4 + 1.9);
    alarmNodes.push(osc);
  });
}

function fireAlarm() {

function playAlarm() {

function formatHM(totalSecs) {
  if (!totalSecs || totalSecs < 1) return '00:00';
  const h = Math.floor(totalSecs / 3600);
  const m = Math.floor((totalSecs % 3600) / 60);
  return `${pad(h)}:${pad(m)}`;
}
function formatHMS(totalSecs) {
  totalSecs = Math.floor(totalSecs);
  const h = Math.floor(totalSecs / 3600);
  const m = Math.floor((totalSecs % 3600) / 60);
  const s = totalSecs % 60;
  return `${pad(h)}:${pad(m)}:${pad(s)}`;
}
function parseDateKey(key) {
  const [y, m, d] = key.split('-').map(Number);
  return new Date(y, m-1, d);
}
function formatDateLabel(key) {
  const date = parseDateKey(key);
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
  if (date.getTime() === today.getTime()) return 'Hoje';
  if (date.getTime() === yesterday.getTime()) return 'Ontem';
  const weekdays = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
  return `${weekdays[date.getDay()]}, ${pad(date.getDate())}/${pad(date.getMonth()+1)}`;
}

// Build a snapshot of history that includes today's current seconds
function snapshot() {
  rolloverIfNeeded();
  const snap = { ...state.history };
  snap[todayKey()] = Math.floor(state.usage.seconds);
  return snap;
}

function weekAverage(snap) {
  // Last 7 days (inclusive of today)
  const now = new Date();
  const today0 = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  let sum = 0, days = 0;
  for (let i = 0; i < 7; i++) {
    const d = new Date(today0); d.setDate(d.getDate() - i);
    const k = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    if (snap[k] != null) { sum += snap[k]; days++; }
  }
  return { avg: days > 0 ? sum / days : 0, total: sum, days };
}
function monthAverage(snap) {
  // Current month
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth();
  let sum = 0, days = 0;
  for (const k in snap) {
    const d = parseDateKey(k);
    if (d.getFullYear() === y && d.getMonth() === m) {
      sum += snap[k]; days++;
    }
  }
  return { avg: days > 0 ? sum / days : 0, total: sum, days };
}
function overallAverage(snap) {
  const entries = Object.values(snap);
  if (!entries.length) return { avg: 0, total: 0, days: 0 };
  const total = entries.reduce((a, b) => a + b, 0);
  return { avg: total / entries.length, total, days: entries.length };
}
function currentStreak(snap) {
  const now = new Date();
  const today0 = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  // Find most recent day with usage > 0
  let startDay = -1;
  for (let i = 0; i < 400; i++) {
    const d = new Date(today0); d.setDate(d.getDate() - i);
    const k = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    if ((snap[k] || 0) > 0) { startDay = i; break; }
  }
  // No "current" streak if it ended more than 1 day ago
  if (startDay < 0 || startDay > 1) return { count: 0, active: false };
  let count = 0;
  for (let i = startDay; i < 400; i++) {
    const d = new Date(today0); d.setDate(d.getDate() - i);
    const k = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    if ((snap[k] || 0) > 0) count++;
    else break;
  }
  return { count, active: startDay === 0 };
}
function bestDay(snap) {
  let bestSecs = 0, bestKey = null;
  for (const k in snap) {
    if (snap[k] > bestSecs) { bestSecs = snap[k]; bestKey = k; }
  }
  return bestKey ? { key: bestKey, secs: bestSecs } : null;
}

function renderHistoryChart(snap) {
  const now = new Date();
  const today0 = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const DAYS = 14;
  const data = [];
  let sumForAvg = 0, daysWithData = 0;
  for (let i = DAYS - 1; i >= 0; i--) {
    const d = new Date(today0); d.setDate(d.getDate() - i);
    const k = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    const secs = snap[k] || 0;
    if (secs > 0) { sumForAvg += secs; daysWithData++; }
    data.push({ key: k, date: d, secs, isToday: i === 0 });
  }
  const avgSecs = daysWithData > 0 ? sumForAvg / daysWithData : 0;
  const maxSecs = Math.max(...data.map(d => d.secs), avgSecs, 60);

  // Pixel-based viewBox for crisp rendering (text won't distort)
  const W = 560, H = 180;
  const padL = 16, padR = 16, padT = 14, padB = 38;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;
  const slot = chartW / DAYS;
  const barW = Math.min(26, slot * 0.68);

  // Weekday initials in PT-BR: Dom, Seg, Ter, Qua, Qui, Sex, Sáb
  const weekdays = ['D', 'S', 'T', 'Q', 'Q', 'S', 'S'];

  const baselineY = padT + chartH;
  const avgY = baselineY - (avgSecs / maxSecs) * chartH;

  let bars = '';
  let dayLabels = '';
  let weekdayLabels = '';
  let valueLabels = '';

  data.forEach((d, i) => {
    const slotX = padL + slot * i;
    const x = slotX + (slot - barW) / 2;
    const ratio = d.secs / maxSecs;
    const minH = d.secs > 0 ? 4 : 3;
    const h = Math.max(minH, ratio * chartH);
    const y = baselineY - h;
    const cx = slotX + slot / 2;

    let fill;
    if (d.secs === 0) fill = 'url(#barEmpty)';
    else if (d.isToday) fill = 'url(#barToday)';
    else fill = 'url(#barNormal)';

    const glow = d.isToday && d.secs > 0 ? `filter="url(#glowToday)"` : '';
    const tooltip = `${formatDateLabel(d.key)} — ${formatHM(d.secs)}`;

    bars += `<rect class="chart-bar" x="${x}" y="${y}" width="${barW}" height="${h}" rx="4" ry="4" fill="${fill}" ${glow} data-tip="${tooltip}" data-idx="${i}"></rect>`;

    const labelClass = d.isToday ? 'chart-day-label today-label' : 'chart-day-label';
    dayLabels += `<text class="${labelClass}" x="${cx}" y="${H - 20}" text-anchor="middle">${d.date.getDate()}</text>`;
    weekdayLabels += `<text class="chart-weekday-label" x="${cx}" y="${H - 7}" text-anchor="middle">${weekdays[d.date.getDay()]}</text>`;

    if (d.secs > 0) {
      valueLabels += `<text class="chart-value-label" id="val-${i}" x="${cx}" y="${y - 5}" text-anchor="middle">${formatHM(d.secs)}</text>`;
    }
  });

  const baseline = `<line class="chart-baseline" x1="${padL}" y1="${baselineY}" x2="${W - padR}" y2="${baselineY}"></line>`;

  let avgLine = '';
  if (daysWithData > 0 && avgSecs > 0) {
    avgLine = `
      <line class="chart-avg-line" x1="${padL}" y1="${avgY}" x2="${W - padR}" y2="${avgY}"></line>
      <text class="chart-avg-label" x="${W - padR}" y="${avgY - 4}" text-anchor="end">média ${formatHM(avgSecs)}</text>
    `;
  }

  return `
    <svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
      <defs>
        <linearGradient id="barNormal" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#ff3d4a"/>
          <stop offset="55%" stop-color="#d10714"/>
          <stop offset="100%" stop-color="#7a040c"/>
        </linearGradient>
        <linearGradient id="barToday" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#ffcf66"/>
          <stop offset="55%" stop-color="#e0a135"/>
          <stop offset="100%" stop-color="#8a5c0f"/>
        </linearGradient>
        <linearGradient id="barEmpty" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#2a2a2a"/>
          <stop offset="100%" stop-color="#1a1a1a"/>
        </linearGradient>
        <filter id="glowToday" x="-60%" y="-60%" width="220%" height="220%">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>
      ${baseline}
      ${avgLine}
      ${bars}
      ${valueLabels}
      ${dayLabels}
      ${weekdayLabels}
    </svg>
  `;
}

function renderHistory() {
  const body = $('#historyBody');
  const snap = snapshot();
  const week = weekAverage(snap);
  const month = monthAverage(snap);
  const overall = overallAverage(snap);
  const streakInfo = currentStreak(snap);
  const best = bestDay(snap);

  // Sort keys desc for the list
  const sortedKeys = Object.keys(snap).sort().reverse();
  let listHTML = '';
  if (sortedKeys.length === 0 || (sortedKeys.length === 1 && snap[sortedKeys[0]] === 0)) {
    listHTML = `<div class="history-empty">Ainda não há dias registrados.<br>Use o timer para começar a construir seu histórico.</div>`;
  } else {
    listHTML = sortedKeys.map(k => {
      const secs = snap[k];
      const isToday = k === todayKey();
      return `
        <div class="history-row ${isToday ? 'today' : ''}">
          <span class="date">
            <span>${formatDateLabel(k)}</span>
            <small>${k}</small>
          </span>
          <span class="time">${formatHMS(secs)}</span>
        </div>
      `;
    }).join('');
  }

  const streakText = streakInfo.count === 0 ? 'sem dias ativos' :
                     streakInfo.count === 1 ? (streakInfo.active ? 'dia ativo hoje' : 'dia ativo ontem') :
                     streakInfo.active ? 'dias seguidos · ativa hoje' : 'dias seguidos · em risco';
  const streakHighlight = streakInfo.active && streakInfo.count >= 2 ? 'highlight' : '';
  const recordDate = best ? formatDateLabel(best.key) : 'ainda sem registros';

  body.innerHTML = `
    <div class="stats-grid-top">
      <div class="stat-card ${streakHighlight}">
        <div class="stat-label">Sequência</div>
        <div class="stat-value">${streakInfo.count > 0 ? streakInfo.count : '—'}</div>
        <div class="stat-sub">${streakText}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Recorde</div>
        <div class="stat-value">${best ? formatHM(best.secs) : '—'}</div>
        <div class="stat-sub">${best ? 'em ' + recordDate : recordDate}</div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Média / Semana</div>
        <div class="stat-value">${formatHM(week.avg)}</div>
        <div class="stat-sub">${week.days} dia${week.days === 1 ? '' : 's'} com uso</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Média / Mês</div>
        <div class="stat-value">${formatHM(month.avg)}</div>
        <div class="stat-sub">${month.days} dia${month.days === 1 ? '' : 's'} · total ${formatHM(month.total)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Média Geral</div>
        <div class="stat-value">${formatHM(overall.avg)}</div>
        <div class="stat-sub">${overall.days} dia${overall.days === 1 ? '' : 's'} no total</div>
      </div>
    </div>

    <div class="chart-title">
      <span>Últimos 14 dias</span>
      <span class="legend">
        <span><span class="dot" style="background: linear-gradient(180deg, #ff3d4a, #7a040c)"></span>Dia</span>
        <span><span class="dot" style="background: linear-gradient(180deg, #ffcf66, #8a5c0f)"></span>Hoje</span>
      </span>
    </div>
    <div class="chart-wrap">
      ${renderHistoryChart(snap)}
    </div>

    <div class="chart-title">Dias registrados</div>
    <div class="history-list">
      ${listHTML}
    </div>

    <div class="history-actions">
      <button class="reset-usage" id="importJsonBtn" title="Restaurar dados de um backup">Importar JSON</button>
      <button class="reset-usage" id="exportJsonBtn" title="Baixar backup dos seus dados">Exportar JSON</button>
      <input type="file" id="importFileInput" accept="application/json,.json" style="display:none">
    </div>
  `;

  // Tooltip on bars
  const wrap = body.querySelector('.chart-wrap');
  if (wrap) {
    const tip = document.createElement('div');
    tip.className = 'tooltip';
    wrap.appendChild(tip);
    wrap.querySelectorAll('.chart-bar').forEach(bar => {
      bar.addEventListener('mouseenter', (e) => {
        tip.textContent = bar.dataset.tip;
        tip.classList.add('show');
        const idx = bar.dataset.idx;
        const valEl = wrap.querySelector(`#val-${idx}`);
        if (valEl) valEl.classList.add('show');
      });
      bar.addEventListener('mousemove', (e) => {
        const rect = wrap.getBoundingClientRect();
        tip.style.left = (e.clientX - rect.left + 10) + 'px';
        tip.style.top = (e.clientY - rect.top - 28) + 'px';
      });
      bar.addEventListener('mouseleave', () => {
        tip.classList.remove('show');
        wrap.querySelectorAll('.chart-value-label').forEach(v => v.classList.remove('show'));
      });
    });
  }

  const exportBtn = $('#exportJsonBtn');
  if (exportBtn) {
    exportBtn.onclick = () => {
      rolloverIfNeeded();
      const payload = {
        app: 'Timer No ID',
        version: 1,
        exportedAt: new Date().toISOString(),
        today: { date: todayKey(), seconds: Math.floor(state.usage.seconds) },
        history: state.history,
        settings: state.settings,
      };
      const json = JSON.stringify(payload, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `timer-noid-backup-${todayKey()}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    };
  }

  const importBtn = $('#importJsonBtn');
  const importInput = $('#importFileInput');
  if (importBtn && importInput) {
    importBtn.onclick = () => importInput.click();
    importInput.onchange = (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          if (!data || typeof data !== 'object') throw new Error('Arquivo não é um JSON válido.');
          if (!data.history && !data.settings && !data.today) throw new Error('Arquivo não parece ser um backup do Timer No ID.');

          const historyCount = data.history && typeof data.history === 'object' ? Object.keys(data.history).length : 0;
          const msg = `Importar backup?\n\n• ${historyCount} dia(s) no arquivo.\n• Os dias serão mesclados com seu histórico atual (será mantido o maior valor de cada dia).\n• As configurações serão substituídas pelas do backup.\n\nContinuar?`;
          if (!confirm(msg)) { e.target.value = ''; return; }

          // Merge history: keep max per day
          if (data.history && typeof data.history === 'object') {
            for (const k in data.history) {
              const v = Number(data.history[k]) || 0;
              if (v <= 0) continue;
              const current = state.history[k] || 0;
              state.history[k] = Math.max(current, v);
            }
          }

          // If backup has a "today" field for a past date, archive it
          if (data.today && data.today.date && data.today.date !== todayKey()) {
            const backupSecs = Number(data.today.seconds) || 0;
            if (backupSecs > 0) {
              const current = state.history[data.today.date] || 0;
              state.history[data.today.date] = Math.max(current, backupSecs);
            }
          }

          // If backup's today matches our today, take the max
          if (data.today && data.today.date === todayKey()) {
            const backupSecs = Number(data.today.seconds) || 0;
            if (backupSecs > state.usage.seconds) {
              state.usage.seconds = backupSecs;
            }
          }

          // Replace settings (merged with defaults already in state.settings)
          if (data.settings && typeof data.settings === 'object') {
            state.settings = { ...state.settings, ...data.settings };
          }

          saveNow();
          renderHistory();
          updateUsageDisplay();
          alert('Backup importado com sucesso!');
        } catch (err) {
          alert('Erro ao importar: ' + err.message);
        }
        e.target.value = ''; // reset so same file can be picked again
      };
      reader.readAsText(file);
    };
  }
}

$('#historyBtn').addEventListener('click', () => { renderHistory(); $('#historyModal').classList.add('open'); });

$$('.modal-backdrop').forEach(m => {
  m.addEventListener('click', (e) => { if (e.target === m) m.classList.remove('open'); });
  m.querySelectorAll('[data-close]').forEach(b => b.addEventListener('click', () => m.classList.remove('open')));
});

// Shortcuts
document.addEventListener('keydown', (e) => {
  const inField = /INPUT|TEXTAREA|SELECT/.test(document.activeElement.tagName) || document.activeElement.isContentEditable;
  if ($('#alarmBanner').classList.contains('show')) {
    if (e.key === ' ' || e.key === 'Escape' || e.key.toLowerCase() === 'r' || e.key === 'Enter') {
      e.preventDefault();
      stopAlarm(true);
      return;
    }
  }
  if (e.key === 'Escape') { $$('.modal-backdrop.open').forEach(m => m.classList.remove('open')); return; }
  if (inField) return;
  if (e.key === ' ') { e.preventDefault(); if (Timer.running) pauseTimer(); else startTimer(); }
  else if (e.key.toLowerCase() === 'r') { stopAlarm(); pauseTimer(); Timer.remainingMs = Timer.totalMs; updateDisplay(); }
});

// Persist on unload
window.addEventListener('beforeunload', () => { saveNow(); });

// Day rollover watcher
setInterval(() => {
  if (rolloverIfNeeded()) {
    updateUsageDisplay();
  }
}, 30000);

// Init
updateDisplay();
updateUsageDisplay();
</script>

</body>
</html>
